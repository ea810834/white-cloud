<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>白雲班謝師宴出席與收款統計工具</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .paid-row {
            background-color: #f0fdf4 !important;
            border-left: 4px solid #22c55e !important;
        }

        .btn-interact:active {
            transform: scale(0.92);
        }

        @media (max-width: 640px) {
            .sticky-summary {
                position: sticky;
                bottom: 0;
                z-index: 40;
                box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
            }
        }

        .toast-enter { transform: translate(-50%, 20px); opacity: 0; }
        .toast-active { transform: translate(-50%, 0); opacity: 1; transition: all 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 antialiased">
    <div id="root">
        <div class="flex items-center justify-center min-h-screen text-slate-400">
            正在準備白雲班統計工具...
        </div>
    </div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const ICONS = {
            'calculator': <path d="M6 2h12a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm2 14h8M8 12h8M8 8h8" />,
            'map-pin': <g><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" /></g>,
            'minus': <line x1="5" y1="12" x2="19" y2="12" />,
            'plus': <g><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></g>,
            'copy': <g><rect x="9" y="9" width="13" height="13" rx="2" ry="2" /><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" /></g>,
            'check': <polyline points="20 6 9 17 4 12" />,
            'graduation-cap': <g><path d="M22 10v6M2 10l10-5 10 5-10 5z" /><path d="M6 12v5c3 3 9 3 12 0v-5" /></g>,
            'banknote': <g><rect x="2" y="6" width="20" height="12" rx="2" /><circle cx="12" cy="12" r="2" /></g>,
            'pie-chart': <g><path d="M21.21 15.89A10 10 0 1 1 8 2.83" /><path d="M22 12A10 10 0 0 0 12 2v10z" /></g>,
            'cloud-rain': <g><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242" /><path d="M16 14v6M8 14v6M12 16v6" /></g>,
            'list': <g><line x1="8" y1="6" x2="21" y2="6" /><line x1="8" y1="12" x2="21" y2="12" /><line x1="8" y1="18" x2="21" y2="18" /><line x1="3" y1="6" x2="3.01" y2="6" /><line x1="3" y1="12" x2="3.01" y2="12" /><line x1="3" y1="18" x2="3.01" y2="18" /></g>,
            'clock': <g><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></g>,
            'info': <g><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></g>,
            'home': <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
        };

        const Icon = ({ name, size = 16, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {ICONS[name] || null}
            </svg>
        );

        const STORAGE_KEY = 'banquet_progress_v17_final';

        const App = () => {
            const initialFamilies = [
                { id: 1, name: "宥畇", adults: 2, kids: 2 },
                { id: 2, name: "子喬", adults: 2, kids: 2 },
                { id: 3, name: "侑叡", adults: 2, kids: 2 },
                { id: 4, name: "LULU", adults: 2, kids: 2 },
                { id: 5, name: "禮安", adults: 2, kids: 1 },
                { id: 6, name: "瑨瑞", adults: 2, kids: 2 },
                { id: 7, name: "子悅", adults: 2, kids: 2 },
                { id: 8, name: "宥瑄", adults: 2, kids: 1 },
                { id: 9, name: "宣予", adults: 2, kids: 1 },
                { id: 10, name: "睿謙", adults: 2, kids: 2 },
                { id: 11, name: "定陞", adults: 2, kids: 2 },
                { id: 12, name: "欣芸", adults: 1, kids: 1 },
                { id: 13, name: "子恩", adults: 2, kids: 2 },
                { id: 14, name: "丞恩", adults: 2, kids: 2 },
                { id: 15, name: "凡婼", adults: 2, kids: 2 },
                { id: 16, name: "東澤", adults: 2, kids: 3 },
                { id: 17, name: "書玄", adults: 2, kids: 2 },
                { id: 18, name: "苡晴", adults: 1, kids: 1 },
                { id: 19, name: "鈞淯", adults: 1, kids: 1 },
                { id: 20, name: "泊毓", adults: 2, kids: 1 },
                { id: 21, name: "群聿", adults: 2, kids: 2 },
                { id: 22, name: "桐熙", adults: 1, kids: 1 },
                { id: 23, name: "雨彤", adults: 1, kids: 2 },
                { id: 24, name: "希悅", adults: 1, kids: 2 },
                { id: 25, name: "柏淳", adults: 1, kids: 1 },
                { id: 26, name: "喬勻", adults: 2, kids: 2 },
                { id: 27, name: "雅萍老師", adults: 1, kids: 0, isGuest: true },
                { id: 28, name: "佩琪老師", adults: 1, kids: 0, isGuest: true },
            ];

            const [families, setFamilies] = useState(() => {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) return JSON.parse(saved);
                } catch (e) {}
                return initialFamilies.map(f => ({ ...f, paid: false }));
            });

            const [preCollectFee, setPreCollectFee] = useState(800);
            const [isRainy, setIsRainy] = useState(false);
            const [toast, setToast] = useState({ show: false, message: "", type: "info" });

            const EVENT_INFO = {
                date: "7/11",
                time: "17:00-17:30 抵達，18:00 用餐",
                location: "禾園悅色",
                address: "高雄市左營區緯九路61-1號"
            };

            useEffect(() => {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(families));
                } catch (e) {}
            }, [families]);

            const showNotification = (message, type = "info") => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: "", type: "info" }), 3000);
            };

            const updateCount = (id, field, delta) => {
                setFamilies(prev => prev.map(f => f.id === id ? { ...f, [field]: Math.max(0, f[field] + delta) } : f));
            };

            const togglePaid = (id) => {
                setFamilies(prev => prev.map(f => f.id === id ? { ...f, paid: !f.paid } : f));
            };

            const copyToClipboard = (text) => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
            };

            const handleCopyFamily = (family, indexNum) => {
                const isGuest = family.isGuest;
                const fee = isGuest ? 0 : (family.adults + family.kids) * preCollectFee;
                const displayName = indexNum ? `${indexNum}. ${family.name}` : family.name;
                const text = `【${displayName}】謝師宴出席確認\n出席人數：${family.adults}大${family.kids}小\n預收費用：$${fee.toLocaleString()}`;
                
                copyToClipboard(text);
                showNotification(`已複製 ${family.name} 的確認訊息`);
            };

            const handleCopyUnpaid = () => {
                const unpaid = families.filter(f => !f.isGuest && !f.paid);
                if (unpaid.length === 0) {
                    showNotification("太棒了！所有家長都已經繳清囉！🎉", "success");
                    return;
                }
                const list = unpaid.map(f => `${f.name}：$${((f.adults + f.kids) * preCollectFee).toLocaleString()}`).join('\n');
                copyToClipboard(`【謝師宴待繳費名單】\n${list}\n\n再麻煩以上家長撥冗繳費，謝謝！`);
                showNotification("已成功複製待繳清單");
            };

            const totals = useMemo(() => {
                const parentHeadcount = families.reduce((s, f) => s + (f.isGuest ? 0 : (f.adults + f.kids)), 0);
                const teacherHeadcount = families.reduce((s, f) => s + (f.isGuest ? (f.adults + f.kids) : 0), 0);
                const totalRevenue = parentHeadcount * preCollectFee;
                const paidRevenue = families.reduce((s, f) => (f.isGuest || !f.paid) ? s : s + (f.adults + f.kids) * preCollectFee, 0);
                const paidFamilyCount = families.filter(f => !f.isGuest && f.paid).length;
                const totalFamilyCount = families.filter(f => !f.isGuest).length;
                const paidPeopleCount = families.reduce((s, f) => (!f.isGuest && f.paid) ? s + (f.adults + f.kids) : s, 0);
                
                // 固定支出
                const VENUE_FIXED = 16000 + 1000;
                const RAIN_FEE = isRainy ? 4500 : 0;
                const totalExpense = VENUE_FIXED + RAIN_FEE;

                return { 
                    parentHeadcount, 
                    teacherHeadcount,
                    totalAttendance: parentHeadcount + teacherHeadcount,
                    totalRevenue, 
                    paidRevenue, 
                    paidFamilyCount, 
                    totalFamilyCount,
                    paidPeopleCount,
                    venueFixed: VENUE_FIXED,
                    rainFee: RAIN_FEE,
                    totalExpense
                };
            }, [families, preCollectFee, isRainy]);

            let familyCounter = 0;

            return (
                <div className="min-h-screen pb-24 sm:pb-10 relative">
                    <header className="bg-white border-b sticky top-0 z-50 px-4 py-3 sm:py-5 shadow-sm">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3 w-full md:w-auto">
                                <div className="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-lg shrink-0">
                                    <Icon name="calculator" size={24} />
                                </div>
                                <div className="min-w-0">
                                    <h1 className="text-xl sm:text-2xl font-black text-slate-900 leading-none">白雲班謝師宴統計工具</h1>
                                    <div className="mt-2 flex flex-col gap-1">
                                        <p className="text-[11px] sm:text-sm text-slate-500 font-bold flex items-center gap-1.5">
                                            <Icon name="map-pin" size={14} className="text-red-500" />
                                            <span className="truncate">{EVENT_INFO.location}：{EVENT_INFO.address}</span>
                                        </p>
                                        <p className="text-[11px] sm:text-sm text-slate-500 font-bold flex items-center gap-1.5">
                                            <Icon name="clock" size={14} className="text-indigo-500" />
                                            <span>時間：{EVENT_INFO.time}</span>
                                        </p>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-2 bg-slate-100 p-1.5 rounded-2xl w-full md:w-auto border border-slate-200">
                                <div className="flex items-center gap-2 px-3 py-2 bg-white rounded-xl shadow-sm flex-grow md:flex-grow-0">
                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-tighter">每人預收</span>
                                    <div className="flex items-center">
                                        <span className="text-indigo-600 font-black text-sm mr-0.5">$</span>
                                        <input type="number" className="w-16 border-none outline-none font-black text-indigo-600 text-base" value={preCollectFee} onChange={(e) => setPreCollectFee(Number(e.target.value))} />
                                    </div>
                                </div>
                                <button onClick={() => setIsRainy(!isRainy)} className={`flex items-center gap-2 px-4 py-2 rounded-xl transition-all font-black text-sm whitespace-nowrap ${isRainy ? 'bg-blue-600 text-white shadow-lg' : 'bg-white text-slate-400 hover:text-slate-600'}`}>
                                    <Icon name="cloud-rain" size={16} className={isRainy ? "animate-bounce" : ""} />
                                    <span>雨天備案</span>
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4 py-6">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            {/* 左側列表 */}
                            <div className="lg:col-span-7">
                                <div className="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
                                    <div className="px-6 py-5 bg-slate-50 border-b flex justify-between items-center">
                                        <h2 className="text-sm font-black text-slate-500 uppercase tracking-[0.2em] flex items-center gap-2">
                                            <Icon name="list" size={18} /> 出席名單
                                        </h2>
                                        <span className="text-[10px] font-bold text-slate-400 bg-white px-3 py-1 rounded-full border border-slate-200">打勾標記已繳費</span>
                                    </div>
                                    
                                    <div className="divide-y divide-slate-50">
                                        {families.map((f) => {
                                            const currentNum = f.isGuest ? null : ++familyCounter;
                                            return (
                                                <div key={f.id} className={`p-4 sm:p-6 flex items-center justify-between transition-all duration-300 ${f.paid ? 'paid-row' : f.isGuest ? 'bg-indigo-50/40 border-l-4 border-indigo-200' : 'hover:bg-slate-50/50'}`}>
                                                    <div className="flex items-center gap-3 sm:gap-6 flex-grow min-w-0">
                                                        {!f.isGuest && (
                                                            <div 
                                                                onClick={() => togglePaid(f.id)} 
                                                                className={`w-8 h-8 sm:w-10 sm:h-10 rounded-2xl border-2 flex items-center justify-center transition-all cursor-pointer btn-interact shadow-sm ${f.paid ? 'bg-green-500 border-green-500 text-white' : 'bg-white border-slate-200 hover:border-indigo-300'}`}
                                                            >
                                                                {f.paid && <Icon name="check" size={18} />}
                                                            </div>
                                                        )}
                                                        {f.isGuest && <div className="w-8 sm:w-10 flex justify-center text-indigo-500 shrink-0"><Icon name="graduation-cap" size={24} /></div>}
                                                        
                                                        <div className="min-w-0">
                                                            <div className="flex items-center flex-wrap gap-2">
                                                                <span className={`font-black text-sm sm:text-lg truncate tracking-tight ${f.paid ? 'text-green-900' : f.isGuest ? 'text-indigo-800' : 'text-slate-900'}`}>
                                                                    {currentNum ? `${currentNum}. ` : ''}{f.name}
                                                                </span>
                                                                {f.isGuest && <span className="text-[9px] bg-indigo-200 text-indigo-700 px-2 py-0.5 rounded-lg font-black uppercase tracking-wider">Teacher</span>}
                                                            </div>
                                                            <p className="text-[10px] sm:text-xs text-slate-400 font-bold mt-1 tracking-wide">
                                                                {f.adults}大{f.kids}小 · <span className={f.isGuest ? 'text-slate-400 italic' : 'text-indigo-600 font-black'}>{f.isGuest ? '受邀免收費' : `$${((f.adults + f.kids) * preCollectFee).toLocaleString()}`}</span>
                                                            </p>
                                                        </div>
                                                    </div>

                                                    <div className="flex items-center gap-2 sm:gap-10 shrink-0 ml-2 sm:ml-4">
                                                        {/* 人數加減按鈕 - 現在手機上也會顯示 */}
                                                        <div className="flex items-center gap-2 sm:gap-8">
                                                            <div className="flex flex-col items-center gap-1 sm:gap-2">
                                                                <span className="text-[8px] sm:text-[9px] font-black text-slate-300 uppercase tracking-widest text-center">大人</span>
                                                                <div className="flex items-center gap-1 sm:gap-3">
                                                                    <button onClick={() => updateCount(f.id, 'adults', -1)} className="w-7 h-7 sm:w-8 sm:h-8 rounded-lg sm:rounded-xl bg-slate-100 flex items-center justify-center text-slate-400 hover:bg-red-500 hover:text-white transition-all shadow-sm active:scale-90"><Icon name="minus" size={10}/></button>
                                                                    <span className="w-3 sm:w-4 text-center font-black text-xs sm:text-sm">{f.adults}</span>
                                                                    <button onClick={() => updateCount(f.id, 'adults', 1)} className="w-7 h-7 sm:w-8 sm:h-8 rounded-lg sm:rounded-xl bg-slate-100 flex items-center justify-center text-slate-400 hover:bg-indigo-600 hover:text-white transition-all shadow-sm active:scale-90"><Icon name="plus" size={10}/></button>
                                                                </div>
                                                            </div>
                                                            <div className="flex flex-col items-center gap-1 sm:gap-2">
                                                                <span className="text-[8px] sm:text-[9px] font-black text-slate-300 uppercase tracking-widest text-center">小孩</span>
                                                                <div className="flex items-center gap-1 sm:gap-3">
                                                                    <button onClick={() => updateCount(f.id, 'kids', -1)} className="w-7 h-7 sm:w-8 sm:h-8 rounded-lg sm:rounded-xl bg-slate-100 flex items-center justify-center text-slate-400 hover:bg-red-500 hover:text-white transition-all shadow-sm active:scale-90"><Icon name="minus" size={10}/></button>
                                                                    <span className="w-3 sm:w-4 text-center font-black text-xs sm:text-sm">{f.kids}</span>
                                                                    <button onClick={() => updateCount(f.id, 'kids', 1)} className="w-7 h-7 sm:w-8 sm:h-8 rounded-lg sm:rounded-xl bg-slate-100 flex items-center justify-center text-slate-400 hover:bg-indigo-600 hover:text-white transition-all shadow-sm active:scale-90"><Icon name="plus" size={10}/></button>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <button onClick={() => handleCopyFamily(f, currentNum)} className={`p-2.5 sm:p-3 rounded-xl sm:rounded-2xl btn-interact transition-all shadow-sm ${toast.show && toast.message.includes(f.name) ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400 hover:bg-indigo-100 hover:text-indigo-600'}`}>
                                                            <Icon name="copy" size={18} />
                                                        </button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>

                            {/* 右側：整合後的統計面板 */}
                            <div className="lg:col-span-5 space-y-6">
                                <div className="bg-slate-900 rounded-[2.5rem] text-white shadow-2xl overflow-hidden flex flex-col">
                                    {/* 上半部：收款與出席總覽 */}
                                    <div className="p-8 pb-4 relative overflow-hidden">
                                        <div className="relative z-10">
                                            <div className="flex justify-between items-start mb-6">
                                                <h3 className="text-[10px] font-black uppercase tracking-[0.3em] text-slate-400">當前統計摘要</h3>
                                                <Icon name="calculator" className="text-indigo-400" size={24} />
                                            </div>
                                            
                                            <div className="mb-8">
                                                <div className="flex items-baseline gap-1">
                                                    <small className="text-xl font-bold text-indigo-400">$</small>
                                                    <p className="text-5xl font-black tracking-tighter leading-none">
                                                        {totals.paidRevenue.toLocaleString()}
                                                    </p>
                                                </div>
                                                <div className="w-full bg-white/5 h-4 rounded-full overflow-hidden my-4 p-1">
                                                    <div 
                                                        className="bg-indigo-500 h-full transition-all duration-1000 ease-out rounded-full shadow-[0_0_20px_rgba(99,102,241,0.5)]" 
                                                        style={{ width: `${Math.min(100, (totals.paidRevenue / totals.totalRevenue) * 100)}%` }}
                                                    ></div>
                                                </div>
                                                <div className="flex justify-between text-[11px] font-black uppercase text-slate-400">
                                                    <span>預收目標: ${totals.totalRevenue.toLocaleString()}</span>
                                                    <span className="text-indigo-400">{Math.round((totals.paidRevenue / totals.totalRevenue) * 100) || 0}% 已入帳</span>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-1 gap-6 pb-6">
                                                <div className="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/5">
                                                    <div>
                                                        <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">已繳費紀錄</p>
                                                        <p className="text-xl font-black">
                                                            {totals.paidFamilyCount} <small className="text-[10px] text-slate-500">戶</small>
                                                            <span className="mx-2 text-slate-700">/</span>
                                                            {totals.paidPeopleCount} <small className="text-[10px] text-slate-500">位</small>
                                                        </p>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">總出席人頭</p>
                                                        <p className="text-3xl font-black text-indigo-400">{totals.totalAttendance}</p>
                                                    </div>
                                                </div>
                                                
                                                <div className="flex justify-between gap-4">
                                                    <div className="flex-1 bg-white/5 p-3 rounded-xl text-center border border-white/5">
                                                        <p className="text-[9px] font-black text-slate-500 uppercase mb-1">需繳費家長</p>
                                                        <p className="text-lg font-black text-white">{totals.parentHeadcount} 位</p>
                                                    </div>
                                                    <div className="flex-1 bg-white/5 p-3 rounded-xl text-center border border-white/5">
                                                        <p className="text-[9px] font-black text-indigo-400 uppercase mb-1">免收費嘉賓</p>
                                                        <p className="text-lg font-black text-indigo-300">{totals.teacherHeadcount} 位</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="absolute -top-24 -right-24 w-80 h-80 bg-indigo-500 rounded-full opacity-5 blur-3xl"></div>
                                    </div>

                                    {/* 下半部：活動支出預估詳情 (整合在一起) */}
                                    <div className="bg-slate-800/50 p-8 border-t border-white/5">
                                        <div className="flex items-center gap-2 mb-6">
                                            <Icon name="pie-chart" size={16} className="text-indigo-400" />
                                            <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">活動支出預估詳情</h3>
                                        </div>
                                        
                                        <div className="space-y-4 mb-8">
                                            <div className="flex justify-between items-center">
                                                <div className="flex items-center gap-2 text-slate-400">
                                                    <Icon name="home" size={14} />
                                                    <span className="text-xs font-bold tracking-tight">場地 (4hr) + 垃圾費</span>
                                                </div>
                                                <span className="text-xs font-black text-slate-200">${totals.venueFixed.toLocaleString()}</span>
                                            </div>

                                            {isRainy && (
                                                <div className="flex justify-between items-center text-blue-400 animate-pulse">
                                                    <div className="flex items-center gap-2">
                                                        <Icon name="cloud-rain" size={14} />
                                                        <span className="text-xs font-bold tracking-tight">雨天棚架備案費用</span>
                                                    </div>
                                                    <span className="text-xs font-black">${totals.rainFee.toLocaleString()}</span>
                                                </div>
                                            )}
                                        </div>

                                        <div className="pt-6 border-t border-white/10 flex justify-between items-center">
                                            <div>
                                                <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">預定支出總計</span>
                                                <p className="text-[9px] text-slate-500 italic">(不含餐費計算)</p>
                                            </div>
                                            <span className="text-3xl font-black text-rose-500 tracking-tighter">${totals.totalExpense.toLocaleString()}</span>
                                        </div>
                                    </div>
                                </div>

                                {/* 複製待繳費名單按鈕 */}
                                <button onClick={handleCopyUnpaid} className="w-full py-5 bg-white border-2 border-slate-100 rounded-[1.5rem] flex items-center justify-center gap-3 text-slate-700 font-black text-sm btn-interact hover:bg-slate-50 hover:border-slate-200 transition-all shadow-sm group">
                                    <Icon name="copy" size={20} className="text-indigo-600 group-hover:rotate-3 transition-transform" />
                                    複製待繳費名單 (LINE)
                                </button>
                            </div>
                        </div>
                    </main>

                    {/* 行動版浮動導覽 */}
                    <div className="sm:hidden fixed bottom-6 left-4 right-4 z-50 pointer-events-none">
                        <div className="bg-white/95 backdrop-blur-lg p-4 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.15)] border border-white/50 flex items-center justify-between pointer-events-auto">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 rounded-2xl bg-slate-900 flex items-center justify-center text-white shadow-lg">
                                    <span className="text-xs font-black">{Math.round((totals.paidRevenue / totals.totalRevenue) * 100) || 0}%</span>
                                </div>
                                <div>
                                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-wider">已收總額</p>
                                    <p className="text-lg font-black text-slate-900 leading-none">${totals.paidRevenue.toLocaleString()}</p>
                                </div>
                            </div>
                            <button onClick={handleCopyUnpaid} className="bg-indigo-50 text-indigo-600 p-3 rounded-2xl active:scale-95 transition-transform">
                                <Icon name="copy" size={24} />
                            </button>
                        </div>
                    </div>

                    {/* Toast 提示 */}
                    <div className={`fixed bottom-24 sm:bottom-12 left-1/2 z-[100] pointer-events-none ${toast.show ? 'toast-active' : 'toast-enter'}`}>
                        <div className="bg-slate-900 text-white px-8 py-4 rounded-full shadow-2xl flex items-center gap-3 border border-slate-700 whitespace-nowrap shadow-indigo-500/20">
                            <Icon name={toast.type === "success" ? "check" : "info"} className={toast.type === "success" ? "text-green-400" : "text-indigo-400"} size={22} />
                            <span className="text-sm font-black tracking-widest">{toast.message}</span>
                        </div>
                    </div>
                </div>
            );
        };

        window.addEventListener('load', () => {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        });
    </script>
</body>
</html>
